name: Mirror CI Badges

on:
  workflow_run:
    workflows: ["CodeQL"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

jobs:
  mirror:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate badges from workflow status
        env:
          GH_TOKEN: ${{ secrets.BADGE_TOKEN }}
        run: |
          mkdir -p docs/assets/badges

          get_badge_svg() {
            local repo="$1"
            local workflow="$2"
            local label="$3"
            local out="$4"

            conclusion=$(gh api "repos/OldManYellsAtK8s/${repo}/actions/workflows/${workflow}/runs?per_page=1&branch=main" \
              --jq '.workflow_runs[0].conclusion' 2>/dev/null || echo "unknown")

            case "$conclusion" in
              success)  color="brightgreen" ; status="passing" ;;
              failure)  color="red"         ; status="failing" ;;
              cancelled) color="yellow"     ; status="cancelled" ;;
              *)        color="lightgrey"   ; status="unknown" ;;
            esac

            curl -fsSL "https://img.shields.io/badge/$(python3 -c "import urllib.parse; print(urllib.parse.quote('${label}'.replace('-', '--')))")-${status}-${color}.svg" -o "$out"
          }

          get_badge_svg "dev-bookstack"  "ci.yml"    "CI"                  "docs/assets/badges/dev-bookstack-ci.svg"
          get_badge_svg "aws-bookstack"  "drift.yml" "Drift Detection"     "docs/assets/badges/aws-bookstack-drift.svg"
          get_badge_svg "aws-bookstack"  "ci.yml"    "Terraform CI"        "docs/assets/badges/aws-bookstack-ci.svg"
          get_badge_svg "aws-bookstack"  "cd.yml"    "Terraform CD-Deploy" "docs/assets/badges/aws-bookstack-cd.svg"

      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/badges/
          git diff --cached --quiet || git commit -m "chore: mirror CI badges"
          git push
