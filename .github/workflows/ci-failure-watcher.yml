name: CI Failure Watcher

on:
  workflow_run:
    workflows:
      - "Publish Docker image"
      - "Deploy static content to Pages"
      - "Mirror CI Badges"
    types: [completed]

jobs:
  trigger-autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Claude AutoFix
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'claude-autofix.yml',
              ref: context.repo.defaultBranch,
              inputs: {
                failed_run_id: String(${{ github.event.workflow_run.id }}),
                failed_workflow_name: '${{ github.event.workflow_run.name }}',
                failed_branch: '${{ github.event.workflow_run.head_branch }}',
                failed_sha: '${{ github.event.workflow_run.head_sha }}'
              }
            });
